<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinese Colors</title>
  <link href="//unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
</head>

<body x-data="vcolor" x-init="$nextTick(() => { getColors() })" class="bg-gray-200" :style="gcolor.style">
  <div class="container mx-auto p-4">

    <div class="grid grid-cols-3 gap-4">
      <div class="col-span-2">
        <div class="grid grid-cols-6 gap-4">
          <template x-for="(color,index) in colors" :key="index">
            <div class="col-2 rounded-full" @click="setColor(color)">
              <div class="m-1 p-1"
                x-data="{rgb:{backgroundColor:'rgb('+color.rgb[0]+','+color.rgb[1]+','+color.rgb[2]+')'}}">
                <div class="" :style="rgb">
                  <p class="" x-text="color.name"></p>
                  <p class="" x-text="color.pinyin"></p>
                  <p class="" x-text="rgb.backgroundColor"></p>
                  <p class="" x-text="color.hex"></p>
                </div>
                <div class="" x-data={r0:color.rgb[0]*100/255,r1:color.rgb[1]*100/255,r2:color.rgb[2]*100/255}>
                  <div class="h-1 my-1 relative max-w-xl rounded-full overflow-hidden">
                    <div class="w-full h-full bg-gray-200 absolute"></div>
                    <div class="h-full bg-red-500 absolute" :style="{width:r0+'%'}"></div>
                  </div>
                  <div class="h-1 my-1 relative max-w-xl rounded-full overflow-hidden">
                    <div class="w-full h-full bg-gray-200 absolute"></div>
                    <div class="h-full bg-green-500 absolute" :style="{width:r1+'%'}"></div>
                  </div>
                  <div class="h-1 my-1 relative max-w-xl rounded-full overflow-hidden">
                    <div class="w-full h-full bg-gray-200 absolute"></div>
                    <div class="h-full bg-blue-500 absolute" :style="{width:r2+'%'}"></div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <div class="h-screen sticky top-0">
        <div class="mx-2">
          <div class="my-8 flex justify-center items-center">
            <div class="mx-4">
              <div class="text-lg" x-text="gcolor.name"></div>
              <div x-text="gcolor.pinyin"></div>
            </div>
            <div class="my-4" x-show="gcolor.initialized">
              <span class="" x-text="gcolor.cmyk.x0"></span>
              <span class="donut dd-c initialed" x-text="gcolor.cmyk.x0"></span>

              <span class="" x-text="gcolor.cmyk.x1"></span>
              <span class="donut dd-m initialed" x-text="gcolor.cmyk.x1"></span>

              <span class="" x-text="gcolor.cmyk.x2"></span>
              <span class="donut dd-y initialed" x-text="gcolor.cmyk.x2"></span>

              <span class="" x-text="gcolor.cmyk.x3"></span>
              <span class="donut dd-k initialed" x-text="gcolor.cmyk.x3"></span>
            </div>
          </div>
          <div class="col-12" x-data x-init="$watch('gcolor.style.backgroundColor', () => {onShow()})">
            <div class="my-2">
              <div class="h-1 my-1 relative max-w-xl rounded-full overflow-hidden">
                <div class="w-full h-full bg-gray-200 absolute"></div>
                <div class="h-full bg-red-500 absolute" :style="{width:gcolor.rgb.r0}"></div>
              </div>
              <div class="h-1 my-1 relative max-w-xl rounded-full overflow-hidden">
                <div class="w-full h-full bg-gray-200 absolute"></div>
                <div class="h-full bg-green-500 absolute" :style="{width:gcolor.rgb.r1}"></div>
              </div>
              <div class="h-1 my-1 relative max-w-xl rounded-full overflow-hidden">
                <div class="w-full h-full bg-gray-200 absolute"></div>
                <div class="h-full bg-blue-500 absolute" :style="{width:gcolor.rgb.r2}"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>

<script src="//unpkg.com/alpinejs" defer></script>
<script src="/js/jquery.min.js"></script>
<script src="/js/jquery.peity.min.js" defer></script>
<script>
  document.addEventListener('alpine:initializing', () => {
    Alpine.data('vcolor', () => ({
      query: new URLSearchParams(location.search).get('q'),//url?q=china
      color_type: "chinese",
      colors: [],
      gcolor: {
        initialized: false,
        style: {
          backgroundColor: 'rgb(250,250,250)',
        },
        rgb: {},
        cmyk: {},
      },

      getColors: async function () {
        const response = await fetch(
          `/data/${this.color_type}_colors.json`
        );
        const data = await response.json();
        this.colors = data;
        const color = this.colors[Math.floor(Math.random() * this.colors.length)];
        this.setColor(color);
      },

      setColor(color) {
        this.gcolor = Object.assign({}, this.gcolor, color);

        this.gcolor.style.backgroundColor = 'rgb(' + color.rgb[0] + ',' + color.rgb[1] + ',' + color.rgb[2] + ')';
        this.gcolor.rgb = Object.assign({},
          this.gcolor.rgb, {
          r0: color.rgb[0] * 100 / 255 + "%",
          r1: color.rgb[1] * 100 / 255 + "%",
          r2: color.rgb[2] * 100 / 255 + "%",
        });
        this.gcolor.cmyk = Object.assign({},
          this.gcolor.cmyk, {
          x0: color.cmyk[0] + '/100',
          x1: color.cmyk[1] + '/100',
          x2: color.cmyk[2] + '/100',
          x3: color.cmyk[3] + '/100',
        });
        this.gcolor.initialized = true;
      },
      onShow() {
        $(".dd-c").peity("donut", { fill: ["#0d5661", "#eee"], innerRadius: 36, radius: 40, });
        $(".dd-m").peity("donut", { fill: ["#cb1b45", "#eee"], innerRadius: 36, radius: 40, });
        $(".dd-y").peity("donut", { fill: ["#ffc408", "#eee"], innerRadius: 36, radius: 40, });
        $(".dd-k").peity("donut", { fill: ["#1c1c1c", "#eee"], innerRadius: 36, radius: 40, });
      },
    }))
  })
</script>

</html>
